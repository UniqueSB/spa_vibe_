    <script>
        // Supabase 초기화 (Vercel 환경변수 기반)
        let SUPABASE_URL = '';
        let SUPABASE_KEY = '';

        let supabaseClient = null;
        let useSupabase = false;

        async function loadSupabaseConfig() {
            try {
                const response = await fetch('/api/config', { cache: 'no-store' });
                if (!response.ok) {
                    return { SUPABASE_URL: '', SUPABASE_KEY: '' };
                }
                const config = await response.json();
                return {
                    SUPABASE_URL: config.SUPABASE_URL || '',
                    SUPABASE_KEY: config.SUPABASE_KEY || ''
                };
            } catch (error) {
                console.warn('원격 설정 로드 실패, 로컬 모드로 진행:', error.message);
                return { SUPABASE_URL: '', SUPABASE_KEY: '' };
            }
        }

        async function initializeSupabase() {
            const config = await loadSupabaseConfig();
            SUPABASE_URL = config.SUPABASE_URL;
            SUPABASE_KEY = config.SUPABASE_KEY;

            if (SUPABASE_URL && SUPABASE_KEY && SUPABASE_URL.includes('supabase.co')) {
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                useSupabase = true;
                console.log('Supabase 연결됨');
            } catch (error) {
                console.error('Supabase 연결 실패:', error);
                console.log('로컬 스토리지 사용');
            }
            } else {
                console.log('로컬 스토리지 모드로 실행');
            }
        }

        // 기기 고유 ID 생성
        function getDeviceId() {
            let deviceId = localStorage.getItem('deviceId');
            if (!deviceId) {
                const nav = navigator;
                const screen = window.screen;
                const fingerprint = [
                    nav.userAgent,
                    nav.language,
                    screen.width,
                    screen.height,
                    screen.colorDepth,
                    new Date().getTimezoneOffset(),
                    nav.hardwareConcurrency,
                    nav.platform
                ].join('|');
                
                let hash = 0;
                for (let i = 0; i < fingerprint.length; i++) {
                    const char = fingerprint.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                deviceId = 'dev_' + Math.abs(hash).toString(36);
                localStorage.setItem('deviceId', deviceId);
            }
            return deviceId;
        }

            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            const animal = animals[Math.floor(Math.random() * animals.length)];
            const num = Math.floor(Math.random() * 999);
            return `${prefix} ${animal} ${num}`;

        // 로컬 스토리지 기본 함수
        function loadDataLocal(key) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : {};
        }

        function saveDataLocal(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // Supabase 함수들
        async function getLikesFromSupabase() {
            if (!useSupabase) return {};
            try {
                const { data, error } = await supabaseClient
                    .from('project_likes')
                    .select('*');
                if (error) throw error;
                
                const likes = {};
                data.forEach(item => {
                    likes[item.project_id] = item.like_count;
                });
                return likes;
            } catch (error) {
                console.error('좋아요 로드 실패:', error);
                return {};
            }
        }

        async function addLikeToSupabase(projectId) {
            if (!useSupabase) return false;
            try {
                // 먼저 현재 좋아요 수 가져오기
                const { data: existing } = await supabaseClient
                    .from('project_likes')
                    .select('*')
                    .eq('project_id', projectId)
                    .single();

                if (existing) {
                    // 업데이트
                    const { error } = await supabaseClient
                        .from('project_likes')
                        .update({ like_count: existing.like_count + 1 })
                        .eq('project_id', projectId);
                    if (error) throw error;
                } else {
                    // 새로 생성
                    const { error } = await supabaseClient
                        .from('project_likes')
                        .insert([{ project_id: projectId, like_count: 1 }]);
                    if (error) throw error;
                }

                // 기기별 좋아요 기록 (중복 체크)
                const { data: deviceLike } = await supabaseClient
                    .from('device_likes')
                    .select('*')
                    .eq('device_id', deviceId)
                    .eq('project_id', projectId)
                    .single();

                if (!deviceLike) {
                    // 새 기록만 추가
                    const { error: deviceError } = await supabaseClient
                        .from('device_likes')
                        .insert([{ device_id: deviceId, project_id: projectId }]);
                    
                    if (deviceError && deviceError.code !== '23505') throw deviceError;
                }
                
                return true;
            } catch (error) {
                console.error('좋아요 추가 실패:', error);
                return false;
            }
        }

        async function removeLikeFromSupabase(projectId) {
            if (!useSupabase) return false;
            try {
                // 좋아요 수 감소
                const { data: existing } = await supabaseClient
                    .from('project_likes')
                    .select('*')
                    .eq('project_id', projectId)
                    .single();

                if (existing && existing.like_count > 0) {
                    const { error } = await supabaseClient
                        .from('project_likes')
                        .update({ like_count: existing.like_count - 1 })
                        .eq('project_id', projectId);
                    if (error) throw error;
                }

                // 기기별 좋아요 기록 삭제
                const { error: deviceError } = await supabaseClient
                    .from('device_likes')
                    .delete()
                    .eq('device_id', deviceId)
                    .eq('project_id', projectId);
                
                return true;
            } catch (error) {
                console.error('좋아요 취소 실패:', error);
                return false;
            }
        }

        async function checkDeviceLiked(projectId) {
            if (!useSupabase) return false;
            try {
                const { data, error } = await supabaseClient
                    .from('device_likes')
                    .select('*')
                    .eq('device_id', deviceId)
                    .eq('project_id', projectId);
                
                return data && data.length > 0;
            } catch (error) {
                console.error('좋아요 확인 실패:', error);
                return false;
            }
        }

        async function getDeviceLikedProjectsFromSupabase() {
            if (!useSupabase) return {};
            try {
                // 한 번에 모든 기기별 좋아요 로드 (개별 요청 대신)
                const { data, error } = await supabaseClient
                    .from('device_likes')
                    .select('*')
                    .eq('device_id', deviceId);
                
                if (error) throw error;
                
                const liked = {};
                data.forEach(item => {
                    liked[item.project_id] = true;
                });
                return liked;
            } catch (error) {
                console.error('기기별 좋아요 확인 실패:', error);
                return {};
            }
        }

        async function getCommentsFromSupabase() {
            if (!useSupabase) return {};
            try {
                const { data, error } = await supabaseClient
                    .from('comments')
                    .select('*')
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                
                const comments = {};
                data.forEach(item => {
                    if (!comments[item.project_id]) {
                        comments[item.project_id] = [];
                    }
                    comments[item.project_id].push({
                        id: item.id,
                        author: item.author,
                        text: item.text,
                        password: item.password,
                        time: new Date(item.created_at).toLocaleString('ko-KR')
                    });
                });
                return comments;
            } catch (error) {
                console.error('댓글 로드 실패:', error);
                return {};
            }
        }

        async function addCommentToSupabase(projectId, author, text, password) {
            if (!useSupabase) return null;
            try {
                const { data, error } = await supabaseClient
                    .from('comments')
                    .insert([{
                        project_id: projectId,
                        author: author,
                        text: text,
                        password: password
                    }])
                    .select();
                
                if (error) throw error;
                return data && data.length > 0 ? data[0] : null;
            } catch (error) {
                console.error('댓글 추가 실패:', error);
                return null;
            }
        }

        async function deleteCommentFromSupabase(commentId, password) {
            if (!useSupabase) return false;
            try {
                // 먼저 비밀번호 확인
                const { data: comment, error: fetchError } = await supabaseClient
                    .from('comments')
                    .select('password')
                    .eq('id', commentId)
                    .single();

                if (fetchError || !comment) {
                    console.error('댓글을 찾을 수 없습니다');
                    return false;
                }

                if (comment.password !== password) {
                    alert('비밀번호가 일치하지 않습니다');
                    return false;
                }

                // 비밀번호가 일치하면 삭제
                const { error: deleteError } = await supabaseClient
                    .from('comments')
                    .delete()
                    .eq('id', commentId);

                if (deleteError) throw deleteError;
                return true;
            } catch (error) {
                console.error('댓글 삭제 실패:', error);
                return false;
            }
        }

        // 데이터 로드 (Supabase 또는 로컬)
        let likes = {};
        let likedProjects = {};
        let comments = {};

        async function loadAllData() {
            try {
                if (useSupabase) {
                    // 병렬 처리: 3개 요청을 동시에 실행 (개별 요청 대신)
                    [likes, comments, likedProjects] = await Promise.all([
                        getLikesFromSupabase(),
                        getCommentsFromSupabase(),
                        getDeviceLikedProjectsFromSupabase()
                    ]);
                } else {
                    likes = loadDataLocal('likes');
                    likedProjects = loadDataLocal('likedProjects_' + deviceId) || {};
                    comments = loadDataLocal('comments');
                }
            } catch (error) {
                console.error('데이터 로드 실패, 로컬 스토리지 사용:', error);
                // 에러 발생 시 로컬 스토리지로 폴백
                likes = loadDataLocal('likes');
                likedProjects = loadDataLocal('likedProjects_' + deviceId) || {};
                comments = loadDataLocal('comments');
                useSupabase = false;
            }
        }

            const card = document.createElement('div');
            card.className = `project-card ${isFinalist ? 'finalist-card' : ''}`;
            
            card.innerHTML = `
                ${isFinalist ? '<div class="finalist-badge">🌟 FINALIST</div>' : ''}
                ${number ? `<div class="project-number">#${number}</div>` : ''}
                <div class="project-title">${project.title}</div>
                <div class="project-author">👤 ${project.author}</div>
                <div class="project-description">${project.description}</div>

                    <button class="btn btn-like ${likedProjects[projectId] ? 'liked' : ''}" data-id="${projectId}">
                        <span class="like-icon">${likedProjects[projectId] ? '♥︎' : '♡'}</span>
                        <span class="like-count">${likeCount}</span>
                    </button>
                </div>
                <div class="comment-section">
                    <div class="comment-toggle" data-id="${projectId}">
                        💬 댓글 ${projectComments.length > 0 ? `(${projectComments.length})` : '쓰기'}
                    </div>
                    <div class="comment-box" data-id="${projectId}">
                        <div class="comment-input-row">
                            <input type="text" class="comment-name-input" placeholder="귀여운 이름 (자동생성)" data-id="${projectId}">
                            <input type="password" class="comment-password-input" placeholder="비밀번호 (4자리)" data-id="${projectId}" maxlength="4">
                        </div>
                        <textarea class="comment-input" placeholder="댓글을 입력하세요..." data-id="${projectId}"></textarea>
                        <button class="comment-submit" data-id="${projectId}">댓글 등록</button>
                        <div class="comments-list" data-id="${projectId}">
                            ${projectComments.map((c, idx) => `
                                <div class="comment-item" data-comment-id="${c.id || idx}">
                                    <div class="comment-item-head">
                                        <div class="comment-item-body">
                                            <div class="comment-author">👤 ${c.author}</div>
                                            <div class="comment-text">${c.text}</div>
                                            <div class="comment-time">${c.time}</div>
                                        </div>
                                        <button class="comment-delete-btn" data-project-id="${projectId}" data-comment-id="${c.id || idx}">삭제</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            return card;
        }

                            comments[projectId].push(commentData);
                            
                            const commentsList = document.querySelector(`.comments-list[data-id="${projectId}"]`);
                            const commentItem = document.createElement('div');
                            commentItem.className = 'comment-item';
                            commentItem.setAttribute('data-comment-id', newComment.id);
                            commentItem.innerHTML = `
                                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <div style="flex: 1;">
                                        <div class="comment-author">👤 ${author}</div>
                                        <div class="comment-text">${text}</div>
                                        <div class="comment-time">${commentData.time}</div>
                                    </div>
                                    <button class="comment-delete-btn" data-project-id="${projectId}" data-comment-id="${newComment.id}">삭제</button>
                                </div>
                            `;
                            commentsList.appendChild(commentItem);

                            const toggle = document.querySelector(`.comment-toggle[data-id="${projectId}"]`);
                            toggle.textContent = `💬 댓글 (${comments[projectId].length})`;

                            textInput.value = '';
                            nameInput.value = '';
                            passwordInput.value = '';
                            
                            // 새 삭제 버튼에 이벤트 리스너 추가
                            setupCommentDeleteListeners();
                        }
                    } else {
                        if (!comments[projectId]) {
                            comments[projectId] = [];
                        }
                        const commentId = Date.now();
                        const commentData = { id: commentId, author, text, password, time };
                        comments[projectId].push(commentData);
                        saveDataLocal('comments', comments);

                        const commentsList = document.querySelector(`.comments-list[data-id="${projectId}"]`);
                        const commentItem = document.createElement('div');
                        commentItem.className = 'comment-item';
                        commentItem.setAttribute('data-comment-id', commentId);
                        commentItem.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div style="flex: 1;">
                                    <div class="comment-author">👤 ${author}</div>
                                    <div class="comment-text">${text}</div>
                                    <div class="comment-time">${time}</div>
                                </div>
                                <button class="comment-delete-btn" data-project-id="${projectId}" data-comment-id="${commentId}">삭제</button>
                            </div>
                        `;
                        commentsList.appendChild(commentItem);

                        const toggle = document.querySelector(`.comment-toggle[data-id="${projectId}"]`);
                        toggle.textContent = `💬 댓글 (${comments[projectId].length})`;

                        textInput.value = '';
                        nameInput.value = '';
                        passwordInput.value = '';
                        
                        // 새 삭제 버튼에 이벤트 리스너 추가
                        setupCommentDeleteListeners();
                    }
                });
            });
            
            // 댓글 삭제 버튼 이벤트 설정
            setupCommentDeleteListeners();
        }
        
        function setupCommentDeleteListeners() {
            document.querySelectorAll('.comment-delete-btn').forEach(btn => {
                // 기존 이벤트 리스너 제거 방지
                btn.replaceWith(btn.cloneNode(true));
            });
            
            document.querySelectorAll('.comment-delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const projectId = btn.getAttribute('data-project-id');
                    const commentId = btn.getAttribute('data-comment-id');
                    
                   const password = prompt('댓글 비밀번호를 입력하세요 (4자리):');
                    if (!password) return;
                    
                    if (useSupabase) {
                        const success = await deleteCommentFromSupabase(commentId, password);
                        if (success) {
                            // UI에서 댓글 제거
                            const commentItem = btn.closest('.comment-item');
                            commentItem.remove();
                            
                            // 메모리에서도 제거
                            if (comments[projectId]) {
                                comments[projectId] = comments[projectId].filter(c => c.id != commentId);
                            }
                            
                            // 댓글 수 업데이트
                            const toggle = document.querySelector(`.comment-toggle[data-id="${projectId}"]`);
                            const count = comments[projectId] ? comments[projectId].length : 0;
                            toggle.textContent = count > 0 ? `💬 댓글 (${count})` : '💬 댓글 쓰기';
                            
                            alert('댓글이 삭제되었습니다');
                        }
                    } else {
                        // 로컬 스토리지에서 비밀번호 확인
                        if (comments[projectId]) {
                            const comment = comments[projectId].find(c => c.id == commentId);
                            if (comment && comment.password === password) {
                                // UI에서 댓글 제거
                                const commentItem = btn.closest('.comment-item');
                                commentItem.remove();
                                
                                // 메모리와 로컬 스토리지에서 제거
                                comments[projectId] = comments[projectId].filter(c => c.id != commentId);
                                saveDataLocal('comments', comments);
                                
                                // 댓글 수 업데이트
                                const toggle = document.querySelector(`.comment-toggle[data-id="${projectId}"]`);
                                const count = comments[projectId].length;
                                toggle.textContent = count > 0 ? `💬 댓글 (${count})` : '💬 댓글 쓰기';
                                
                                alert('댓글이 삭제되었습니다');
                            } else {
                                alert('비밀번호가 일치하지 않습니다');
                            }
                        }
                    }
                });
            });
        }

        // 페이지 로드 시 실행
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', async () => {
                console.log('DOM 준비 완료, 프로젝트 렌더링 시작');
                await initializeSupabase();
                renderProjects();
            });
        } else {
            console.log('DOM 이미 준비됨, 프로젝트 렌더링 시작');
            initializeSupabase().then(() => renderProjects());
        }
    </script>
</body>
</html>
