        // 기기 고유 ID 생성 (Fingerprinting)
        function getDeviceId() {
            let deviceId = localStorage.getItem('deviceId');
            if (!deviceId) {
                // 브라우저 정보 기반 간단한 fingerprint 생성
                const nav = navigator;
                const screen = window.screen;
                const fingerprint = [
                    nav.userAgent,
                    nav.language,
                    screen.width,
                    screen.height,
                    screen.colorDepth,
                    new Date().getTimezoneOffset(),
                    nav.hardwareConcurrency,
                    nav.platform
                ].join('|');
                
                // 간단한 해시 함수
                let hash = 0;
                for (let i = 0; i < fingerprint.length; i++) {
                    const char = fingerprint.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                deviceId = 'dev_' + Math.abs(hash).toString(36);
                localStorage.setItem('deviceId', deviceId);
            }
            return deviceId;
        }

            const noun = nouns[Math.floor(Math.random() * nouns.length)];

            return `${adj}_${noun}_${num}`;

            { num: 19, title: 'Travel Diary - 여행 기록 자동화', author: '정철범', description: 'GPS 기반 동선 추적으로 여행 경로를 자동 기록하고 사진과 함께 타임라인 형식의 여행 다이어리를 생성하는 서비스 (AI 분석)', url: 'https://running-map-mu.vercel.app' },
            { num: 20, title: 'Lunch Logic Model', author: '정영훈', description: '직장인 점심 의사결정을 최적화하는 AI 논리 모델. 예산, 시간, 선호도를 종합적으로 분석하여 최선의 선택지 제시 (AI 분석)', url: 'https://statics.teams.cdn.office.net/evergreen-assets/safelinks/2/atp-safelinks.html' },
            { num: 22, title: 'SIGNAL - AI 성장주 투자 플랫폼', author: '정혜경', description: 'AI 기반 성장주 발굴 및 포트폴리오 관리 플랫폼. 종목 스크리닝, 투자 인사이트, 자산 추적 통합 솔루션 (AI 분석)', url: 'https://thesis-app-ten.vercel.app/' }
        ];

        const deviceId = getDeviceId();
        
        // 로컬 스토리지에서 데이터 로드
        function loadData(key) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : {};
        }

        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        const likes = loadData('likes');
        const likedProjects = loadData('likedProjects_' + deviceId) || {};
        const comments = loadData('comments');

        function createProjectCard(project, isFinalist = false, number = null) {
            const projectId = project.id || `p${number}`;
            const likeCount = likes[projectId] || 0;
            const projectComments = comments[projectId] || [];

            const card = document.createElement('div');
            card.className = `project-card ${isFinalist ? 'finalist-card' : ''}`;
            
            card.innerHTML = `
                ${isFinalist ? '<div class="finalist-badge">🌟 FINALIST</div>' : ''}
                ${number ? `<div class="project-number">#${number}</div>` : ''}
                <div class="project-title">${project.title}</div>
                <div class="project-author">👤 ${project.author}</div>
                <div class="project-description">💡 ${project.description}</div>
                <div class="project-actions">
                    <a href="${project.url}" target="_blank" class="btn btn-primary">
                        🔗 프로젝트 보기
                    </a>
                    <button class="btn btn-like" data-id="${projectId}">
                        <span class="like-icon">❤️</span>
                        <span class="like-count">${likeCount}</span>
                    </button>
                </div>
                <div class="comment-section">
                    <div class="comment-toggle" data-id="${projectId}">
                        💬 댓글 ${projectComments.length > 0 ? `(${projectComments.length})` : '쓰기'}
                    </div>
                    <div class="comment-box" data-id="${projectId}">
                        <textarea class="comment-input" placeholder="댓글을 입력하세요..."></textarea>
                        <button class="comment-submit" data-id="${projectId}">댓글 등록</button>
                        <div class="comments-list" data-id="${projectId}">
                            ${projectComments.map(c => `
                                <div class="comment-item">
                                    <div class="comment-author">${c.author}</div>
                                    <div class="comment-text">${c.text}</div>
                                    <div class="comment-time">${c.time}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            return card;
        }

        // 최종 후보 렌더링
        const finalistsContainer = document.getElementById('finalists');
        finalists.forEach(finalist => {
            finalistsContainer.appendChild(createProjectCard(finalist, true));
        });

        // 전체 참석자 렌더링
        const participantsContainer = document.getElementById('participants');
        allParticipants.forEach(participant => {
            participantsContainer.appendChild(createProjectCard(participant, false, participant.num));
        });

        // 좋아요 기능 (기기별 중복 방지)
        document.querySelectorAll('.btn-like').forEach(btn => {
            const projectId = btn.dataset.id;
            
            // 이미 좋아요를 눌렀는지 확인
            if (likedProjects[projectId]) {
                btn.classList.add('liked', 'disabled');
            }

            btn.addEventListener('click', () => {
                // 이미 좋아요를 누른 경우
                if (likedProjects[projectId]) {
                    return; // 중복 방지
                }

                // 좋아요 추가
                likes[projectId] = (likes[projectId] || 0) + 1;
                likedProjects[projectId] = true;
                
                btn.classList.add('liked', 'disabled');
                btn.querySelector('.like-count').textContent = likes[projectId];
                
                saveData('likes', likes);
                saveData('likedProjects_' + deviceId, likedProjects);
            });
        });

        // 댓글 토글
        document.querySelectorAll('.comment-toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const projectId = toggle.dataset.id;
                const commentBox = document.querySelector(`.comment-box[data-id="${projectId}"]`);
                commentBox.classList.toggle('active');
            });
        });

        // 댓글 등록 (익명 닉네임)
        document.querySelectorAll('.comment-submit').forEach(btn => {
            btn.addEventListener('click', () => {
                const projectId = btn.dataset.id;
                const input = btn.parentElement.querySelector('.comment-input');
                const text = input.value.trim();
                
                if (text) {
                    const comment = {
                        author: generateAnonymousName(),
                        text: text,
                        time: new Date().toLocaleString('ko-KR')
                    };
                    
                    if (!comments[projectId]) {
                        comments[projectId] = [];
                    }
                    comments[projectId].push(comment);
                    saveData('comments', comments);

                    // 댓글 목록 업데이트
                    const commentsList = document.querySelector(`.comments-list[data-id="${projectId}"]`);
                    const commentItem = document.createElement('div');
                    commentItem.className = 'comment-item';
                    commentItem.innerHTML = `
                        <div class="comment-author">${comment.author}</div>
                        <div class="comment-text">${comment.text}</div>
                        <div class="comment-time">${comment.time}</div>
                    `;
                    commentsList.appendChild(commentItem);

                    // 토글 텍스트 업데이트
                    const toggle = document.querySelector(`.comment-toggle[data-id="${projectId}"]`);
                    toggle.textContent = `💬 댓글 (${comments[projectId].length})`;

                    input.value = '';
                }
            });
        });
    </script>
</body>
</html>
